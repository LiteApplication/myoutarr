# Plain docker-compose for non-Swarm users. See docker-stack.yml for Swarm.
services:
  myoutarr:
    image: ghcr.io/liteapplication/myoutarr:latest
    build: .
    container_name: myoutarr
    ports:
      - '8687:8687'
    environment:
      PUID: '1000'
      PGID: '1000'
      TZ: Europe/Paris
      YTDLP_AUTO_UPDATE: 'false'
    volumes:
      - ./config:/config
      - /path/to/your/music:/music
    restart: unless-stopped
