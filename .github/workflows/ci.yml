name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Pipeline tests tag real Opus files: they need ffmpeg + mutagen.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: python3 -m venv .venv && .venv/bin/pip install ytmusicapi mutagen
      - run: npm ci
      - run: npm run test:unit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: myoutarr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test container
        run: |
          docker run -d --name smoke -p 8687:8687 myoutarr:ci
          for i in $(seq 1 20); do
            if curl -fs http://localhost:8687/api/health > /dev/null; then break; fi
            sleep 2
          done
          curl -fs http://localhost:8687/api/health
          docker exec smoke /opt/venv/bin/yt-dlp --version
          docker exec smoke /opt/venv/bin/python -c "import ytmusicapi, mutagen"
          docker exec smoke ffmpeg -version > /dev/null
          docker rm -f smoke
